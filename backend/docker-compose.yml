version: '3'

services:
  glitchtip:
    image: glitchtip/glitchtip:latest
    ports:
      - "${GLITCHTIP_PORT:-8000}:8000"
    environment:
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      DATABASE_URL: ${GLITCHTIP_DATABASE_URL:-postgres://postgres:system@db:5432/glitchtip}
      # Authenticating with the Redis container using a password
      REDIS_URL: ${GLITCHTIP_REDIS_URL:-redis://:glitchtip_redis_pass@redis:6379}
      EMAIL_URL: smtp://localhost
      GLITCHTIP_DOMAIN: http://localhost:8000
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  redis:
    image: redis:7
    # Force Redis to require a password
    command: redis-server --requirepass ${GLITCHTIP_REDIS_PASSWORD:-glitchtip_redis_pass}
